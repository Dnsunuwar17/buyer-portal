<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login Buyer Portal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <h1 id="page-heading">Welcome back</h1>

    <div id="tab-row" style="display:flex; gap:8px; margin-bottom:1.5rem;">
      <button id="tab-login" style="width:auto;margin:0;background:#4f46e5;color:white;">Login</button>
      <button id="tab-register" style="width:auto;margin:0;background:#f1f5f9;color:#333;">Register</button>
    </div>

    <!-- Login Form -->
    <form id="login-form">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" required>
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password" required minlength="6">
      <button type="submit" id="login-submit">Log in</button>
      <p class="error-msg" id="login-error"></p>
    </form>

    <!-- Register Form -->
    <form id="register-form" style="display:none;">
      <label>Full name</label>
      <input type="text" id="reg-name" placeholder="Jane Smith" required minlength="2">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com" required>
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="At least 6 characters" required minlength="6">
      <button type="submit" id="register-submit">Create account</button>
      <p class="error-msg" id="register-error"></p>
    </form>

  </div>
  <script src="login.js"></script>
</body>

</html>
