<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Dashboard — Buyer Portal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="top-bar">
    <strong>Buyer Portal</strong>
    <div class="user-info">
      Logged in as <strong id="user-name"></strong>
      <span class="badge" id="user-role"></span>
    </div>
    <button id="logout-btn">Log out</button>
  </div>

  <div class="dashboard-container">
    <!-- Error banner -->
    <div id="error-banner"
      style="display:none; background:#fef2f2; color:#991b1b; border:1px;font-size:10px;">
    </div>

    <p class="section-title">All Properties</p>
    <div class="properties-grid" id="all-properties">
      <p>Loading...</p>
    </div>

    <p class="section-title">My Favourites</p>
    <div class="properties-grid" id="my-favourites">
      <p>Loading...</p>
    </div>
  </div>
  <script src="dashboard.js"></script>
</body>

</html>
